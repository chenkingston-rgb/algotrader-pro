services:
  - type: worker
    name: algotrader-pro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_engine.py
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_IS_PAPER
        value: "true"
      - key: BASE44_API_KEY
        sync: false
      - key: HEALTH_PORT
        value: "8099"
    healthCheckPath: /health
