name: AlgoTrader — Daily Pre-Market Scan

on:
  schedule:
    - cron: '15 13 * * 1-5'  # 9:15 AM EDT (UTC-4) = 13:15 UTC, Mon–Fri
  workflow_dispatch:           # also runnable manually

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit watchlist_daily.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests alpaca-py pandas numpy python-dateutil pytz

      - name: Run daily pre-market scanner
        env:
          ALPACA_PAPER_KEY:    ${{ secrets.ALPACA_PAPER_KEY }}
          ALPACA_PAPER_SECRET: ${{ secrets.ALPACA_PAPER_SECRET }}
          ALPACA_IS_PAPER:     "true"
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python scripts/scan_daily.py
